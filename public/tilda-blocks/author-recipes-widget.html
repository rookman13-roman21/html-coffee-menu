<!-- MBS author recipes dynamic catalog for Tilda -->
<div id="mbs-author-recipes-widget"></div>

<style>
  #mbs-author-recipes-widget,
  #mbs-author-recipes-widget * {
    box-sizing: border-box;
  }

  #mbs-author-recipes-widget {
    --mbs-green-dark: #417033;
    --mbs-green: #4F883E;
    --mbs-green-light: #B6D8AB;
    --mbs-bg-green: #E7F2E3;
    --mbs-red: #CC2841;
    --mbs-red-soft: #D83D54;
    --mbs-bg: #F5F5F5;
    --mbs-black: #1F1F1F;
    --mbs-gray: #555555;
    --mbs-white: #FFFFFF;
    font-family: Mulish, Arial, sans-serif;
    color: var(--mbs-black);
  }

  .mbs-arw {
    max-width: 1100px;
    margin: 0 auto;
    padding: 72px 20px;
  }

  .mbs-arw__head {
    display: flex;
    justify-content: space-between;
    gap: 24px;
    align-items: flex-end;
    margin-bottom: 24px;
  }

  .mbs-arw__label {
    display: inline-flex;
    align-items: center;
    margin-bottom: 14px;
    padding: 7px 16px;
    border-radius: 999px;
    background: rgba(231, 242, 227, 0.95);
    color: var(--mbs-green-dark);
    font-size: 13px;
    line-height: 1;
    font-weight: 900;
  }

  .mbs-arw__title {
    margin: 0;
    font-size: 34px;
    font-weight: 900;
    line-height: 1;
    letter-spacing: -0.04em;
  }

  .mbs-arw__subtitle {
    max-width: 620px;
    margin: 10px 0 0;
    color: var(--mbs-gray);
    font-size: 16px;
    font-weight: 500;
    line-height: 1.5;
  }

  .mbs-arw__toolbar {
    display: grid;
    grid-template-columns: 2fr 1fr 1fr 1fr;
    gap: 10px;
    margin-bottom: 18px;
  }

  .mbs-arw__field {
    width: 100%;
    min-height: 48px;
    border: 1.5px solid var(--mbs-green-light);
    border-radius: 14px;
    padding: 0 14px;
    background: var(--mbs-white);
    color: var(--mbs-black);
    font: 700 14px Mulish, Arial, sans-serif;
  }

  .mbs-arw__layout {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 320px;
    gap: 20px;
    align-items: start;
  }

  .mbs-arw__grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 16px;
  }

  .mbs-arw__card,
  .mbs-arw__cart {
    background: var(--mbs-white);
    border: 1px solid var(--mbs-green-light);
    border-radius: 18px;
    overflow: hidden;
    box-shadow: 0 3px 18px rgba(31, 31, 31, 0.05);
  }

  .mbs-arw__img {
    width: 100%;
    aspect-ratio: 4 / 3;
    object-fit: cover;
    display: block;
    background: var(--mbs-bg);
  }

  .mbs-arw__body {
    padding: 16px;
  }

  .mbs-arw__chips {
    display: flex;
    flex-wrap: wrap;
    gap: 7px;
    margin-bottom: 10px;
  }

  .mbs-arw__chip {
    border-radius: 999px;
    padding: 6px 10px;
    background: var(--mbs-bg-green);
    color: var(--mbs-green-dark);
    font-size: 12px;
    font-weight: 900;
  }

  .mbs-arw__name {
    margin: 0 0 8px;
    color: var(--mbs-black);
    font-size: 20px;
    font-weight: 900;
    line-height: 1.15;
  }

  .mbs-arw__author,
  .mbs-arw__desc {
    color: var(--mbs-gray);
    font-size: 14px;
    font-weight: 600;
    line-height: 1.45;
  }

  .mbs-arw__desc {
    margin: 10px 0 14px;
  }

  .mbs-arw__footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .mbs-arw__price {
    color: var(--mbs-green-dark);
    font-size: 20px;
    font-weight: 900;
    white-space: nowrap;
  }

  .mbs-arw__actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: flex-end;
  }

  .mbs-arw__btn {
    min-height: 42px;
    border: 1.5px solid var(--mbs-green-light);
    border-radius: 12px;
    padding: 10px 14px;
    background: var(--mbs-white);
    color: var(--mbs-black) !important;
    font: 900 13px Mulish, Arial, sans-serif;
    text-decoration: none !important;
    cursor: pointer;
  }

  .mbs-arw__btn--buy {
    border-color: var(--mbs-red);
    background: var(--mbs-red);
    color: #fff !important;
  }

  .mbs-arw__btn--green {
    border-color: var(--mbs-green);
    background: var(--mbs-green);
    color: #fff !important;
  }

  .mbs-arw__cart {
    position: sticky;
    top: 24px;
    padding: 16px;
  }

  .mbs-arw__cart-title {
    margin: 0 0 6px;
    font-size: 20px;
    font-weight: 900;
  }

  .mbs-arw__cart-note {
    margin: 0 0 14px;
    color: var(--mbs-gray);
    font-size: 13px;
    font-weight: 600;
    line-height: 1.45;
  }

  .mbs-arw__cart-list {
    display: grid;
    gap: 8px;
    margin-bottom: 12px;
  }

  .mbs-arw__cart-item {
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    gap: 8px;
    align-items: center;
    padding: 10px;
    border-radius: 12px;
    background: var(--mbs-bg);
  }

  .mbs-arw__cart-item b {
    display: block;
    overflow: hidden;
    color: var(--mbs-black);
    font-size: 13px;
    font-weight: 900;
    line-height: 1.2;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .mbs-arw__cart-item span {
    color: var(--mbs-green-dark);
    font-size: 12px;
    font-weight: 900;
  }

  .mbs-arw__remove {
    border: 0;
    background: transparent;
    color: var(--mbs-gray);
    font-size: 20px;
    line-height: 1;
    cursor: pointer;
  }

  .mbs-arw__total {
    display: flex;
    justify-content: space-between;
    margin: 12px 0;
    padding-top: 12px;
    border-top: 1px solid var(--mbs-green-light);
    font-weight: 900;
  }

  .mbs-arw__input {
    width: 100%;
    min-height: 44px;
    margin-bottom: 9px;
    border: 1.5px solid var(--mbs-green-light);
    border-radius: 12px;
    padding: 10px 12px;
    font: 700 13px Mulish, Arial, sans-serif;
  }

  .mbs-arw__message,
  .mbs-arw__empty {
    color: var(--mbs-green-dark);
    font-size: 13px;
    font-weight: 900;
    line-height: 1.4;
  }

  .mbs-arw__empty {
    padding: 24px;
    border: 1.5px dashed var(--mbs-green-light);
    border-radius: 16px;
    text-align: center;
  }

  @media (max-width: 820px) {
    .mbs-arw {
      padding: 64px 14px;
    }

    .mbs-arw__head {
      display: block;
    }

    .mbs-arw__title {
      font-size: 26px;
    }

    .mbs-arw__toolbar,
    .mbs-arw__layout,
    .mbs-arw__grid {
      grid-template-columns: 1fr;
    }

    .mbs-arw__cart {
      position: static;
    }

    .mbs-arw__footer {
      display: grid;
    }

    .mbs-arw__actions,
    .mbs-arw__btn {
      width: 100%;
    }
  }
</style>

<script>
(function () {
  var API = 'https://barista-school.online';
  var root = document.getElementById('mbs-author-recipes-widget');
  var state = {
    recipes: [],
    q: '',
    author: '',
    category: '',
    price: '',
    cart: []
  };

  function esc(value) {
    return String(value || '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function money(value) {
    return Number(value || 0).toLocaleString('ru-RU') + ' ₽';
  }

  function assetUrl(src) {
    if (!src) return '';
    if (/^https?:\/\//i.test(src) || src.indexOf('data:') === 0) return src;
    return API + src;
  }

  function unique(items, getter) {
    var map = {};
    items.forEach(function (item) {
      var key = getter(item);
      if (key) map[key] = true;
    });
    return Object.keys(map).sort();
  }

  function filtered() {
    var q = state.q.trim().toLowerCase();
    return state.recipes.filter(function (recipe) {
      var author = (recipe.author && recipe.author.name) || 'Moscow Barista School';
      var text = [recipe.title, recipe.public_description, recipe.category, author].join(' ').toLowerCase();
      if (q && text.indexOf(q) === -1) return false;
      if (state.author && author !== state.author) return false;
      if (state.category && recipe.category !== state.category) return false;
      if (state.price && Number(recipe.price || 0) > Number(state.price)) return false;
      return true;
    });
  }

  function render() {
    var authors = unique(state.recipes, function (r) { return (r.author && r.author.name) || 'Moscow Barista School'; });
    var categories = unique(state.recipes, function (r) { return r.category || 'Авторские'; });
    var recipes = filtered();
    root.innerHTML = [
      '<section class="mbs-arw">',
        '<div class="mbs-arw__head">',
          '<div>',
            '<span class="mbs-arw__label">Авторские рецепты</span>',
            '<h2 class="mbs-arw__title">Выберите напитки для меню</h2>',
            '<p class="mbs-arw__subtitle">Каталог опубликованных рецептов от авторов Московской школы бариста. Полная техкарта передаётся после оформления покупки.</p>',
          '</div>',
        '</div>',
        '<div class="mbs-arw__toolbar">',
          '<input class="mbs-arw__field" placeholder="Поиск по рецептам" value="' + esc(state.q) + '" data-arw-filter="q" data-arw-search="1">',
          '<select class="mbs-arw__field" data-arw-filter="author"><option value="">Все авторы</option>' + authors.map(function (name) { return '<option value="' + esc(name) + '"' + (state.author === name ? ' selected' : '') + '>' + esc(name) + '</option>'; }).join('') + '</select>',
          '<select class="mbs-arw__field" data-arw-filter="category"><option value="">Все категории</option>' + categories.map(function (name) { return '<option value="' + esc(name) + '"' + (state.category === name ? ' selected' : '') + '>' + esc(name) + '</option>'; }).join('') + '</select>',
          '<select class="mbs-arw__field" data-arw-filter="price"><option value="">Любая цена</option><option value="6000"' + (state.price === '6000' ? ' selected' : '') + '>до 6 000 ₽</option><option value="8000"' + (state.price === '8000' ? ' selected' : '') + '>до 8 000 ₽</option><option value="12000"' + (state.price === '12000' ? ' selected' : '') + '>до 12 000 ₽</option></select>',
        '</div>',
        '<div class="mbs-arw__layout">',
          '<div class="mbs-arw__grid">' + (recipes.length ? recipes.map(card).join('') : '<div class="mbs-arw__empty">По выбранным фильтрам рецептов не найдено.</div>') + '</div>',
          cart(),
        '</div>',
      '</section>'
    ].join('');
  }

  function card(recipe) {
    var author = (recipe.author && recipe.author.name) || 'Moscow Barista School';
    var inCart = state.cart.indexOf(Number(recipe.id)) !== -1;
    var detailUrl = 'https://barista-school.online/recipes/' + encodeURIComponent(recipe.public_slug || recipe.id);
    return [
      '<article class="mbs-arw__card">',
        recipe.image_url ? '<img class="mbs-arw__img" src="' + esc(assetUrl(recipe.image_url)) + '" alt="' + esc(recipe.title) + '">' : '<div class="mbs-arw__img"></div>',
        '<div class="mbs-arw__body">',
          '<div class="mbs-arw__chips">',
            '<span class="mbs-arw__chip">' + esc(recipe.category || 'Авторские') + '</span>',
            recipe.volume_ml ? '<span class="mbs-arw__chip">' + Number(recipe.volume_ml) + ' мл</span>' : '',
            recipe.is_mixology ? '<span class="mbs-arw__chip">MBS MIXOLOGY CUP</span>' : '',
          '</div>',
          '<h3 class="mbs-arw__name">' + esc(recipe.title) + '</h3>',
          '<div class="mbs-arw__author">' + esc(author) + '</div>',
          '<p class="mbs-arw__desc">' + esc(recipe.public_description || '') + '</p>',
          '<div class="mbs-arw__footer">',
            '<div class="mbs-arw__price">' + money(recipe.price) + '</div>',
            '<div class="mbs-arw__actions">',
              '<a class="mbs-arw__btn" href="' + esc(detailUrl) + '" target="_blank" rel="noopener">Подробнее</a>',
              '<button class="mbs-arw__btn ' + (inCart ? 'mbs-arw__btn--green' : 'mbs-arw__btn--buy') + '" data-arw-cart="' + Number(recipe.id) + '">' + (inCart ? 'В корзине' : 'В корзину') + '</button>',
            '</div>',
          '</div>',
        '</div>',
      '</article>'
    ].join('');
  }

  function cart() {
    var items = state.cart.map(function (id) {
      return state.recipes.find(function (recipe) { return Number(recipe.id) === Number(id); });
    }).filter(Boolean);
    var total = items.reduce(function (sum, item) { return sum + Number(item.price || 0); }, 0);
    return [
      '<aside class="mbs-arw__cart">',
        '<h3 class="mbs-arw__cart-title">Корзина</h3>',
        '<p class="mbs-arw__cart-note">Оставьте контакты, и команда школы поможет оформить покупку.</p>',
        '<div class="mbs-arw__cart-list">',
          items.length ? items.map(function (item) {
            return '<div class="mbs-arw__cart-item"><div><b>' + esc(item.title) + '</b><span>' + money(item.price) + '</span></div><button class="mbs-arw__remove" data-arw-cart="' + Number(item.id) + '">&times;</button></div>';
          }).join('') : '<div class="mbs-arw__empty">Выберите рецепты из каталога.</div>',
        '</div>',
        '<div class="mbs-arw__total"><span>Итого</span><span>' + money(total) + '</span></div>',
        '<input class="mbs-arw__input" id="mbs-arw-name" placeholder="Имя">',
        '<input class="mbs-arw__input" id="mbs-arw-phone" placeholder="Телефон">',
        '<input class="mbs-arw__input" id="mbs-arw-email" placeholder="Email">',
        '<button class="mbs-arw__btn mbs-arw__btn--buy" style="width:100%" id="mbs-arw-submit">Отправить заявку</button>',
        '<div class="mbs-arw__message" id="mbs-arw-message"></div>',
      '</aside>'
    ].join('');
  }

  root.addEventListener('input', function (event) {
    var key = event.target && event.target.getAttribute('data-arw-filter');
    if (!key) return;
    state[key] = event.target.value || '';
    if (key !== 'q') render();
  });

  root.addEventListener('change', function (event) {
    var key = event.target && event.target.getAttribute('data-arw-filter');
    if (!key) return;
    state[key] = event.target.value || '';
    render();
  });

  root.addEventListener('keydown', function (event) {
    if (!event.target || !event.target.getAttribute('data-arw-search')) return;
    if (event.key === 'Enter') {
      state.q = event.target.value || '';
      render();
    }
  });

  root.addEventListener('click', function (event) {
    var cartBtn = event.target.closest('[data-arw-cart]');
    if (cartBtn) {
      var id = Number(cartBtn.getAttribute('data-arw-cart'));
      state.cart = state.cart.indexOf(id) === -1 ? state.cart.concat([id]) : state.cart.filter(function (item) { return item !== id; });
      render();
      return;
    }
    if (event.target && event.target.id === 'mbs-arw-submit') submit();
  });

  function submit() {
    var msg = document.getElementById('mbs-arw-message');
    var body = {
      recipe_ids: state.cart,
      customer_name: document.getElementById('mbs-arw-name').value || '',
      customer_phone: document.getElementById('mbs-arw-phone').value || '',
      customer_email: document.getElementById('mbs-arw-email').value || '',
      source: window.location.hostname + window.location.pathname
    };
    if (!body.recipe_ids.length) {
      msg.textContent = 'Выберите хотя бы один рецепт.';
      return;
    }
    if (!body.customer_name.trim() || !body.customer_phone.trim()) {
      msg.textContent = 'Укажите имя и телефон.';
      return;
    }
    msg.textContent = 'Отправляем...';
    fetch(API + '/api/public/author-recipes/cart-order', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(body)
    }).then(function (response) {
      if (!response.ok) throw new Error('order failed');
      state.cart = [];
      render();
      setTimeout(function () {
        var done = document.getElementById('mbs-arw-message');
        if (done) done.textContent = 'Заявка отправлена. Мы свяжемся с вами.';
      }, 0);
    }).catch(function () {
      msg.textContent = 'Не удалось отправить заявку. Попробуйте ещё раз.';
    });
  }

  root.innerHTML = '<section class="mbs-arw"><div class="mbs-arw__empty">Загрузка рецептов...</div></section>';
  fetch(API + '/api/public/author-recipes')
    .then(function (response) { return response.ok ? response.json() : []; })
    .then(function (recipes) {
      state.recipes = Array.isArray(recipes) ? recipes : [];
      render();
    })
    .catch(function () {
      root.innerHTML = '<section class="mbs-arw"><div class="mbs-arw__empty">Не удалось загрузить каталог. Попробуйте обновить страницу.</div></section>';
    });
})();
</script>
