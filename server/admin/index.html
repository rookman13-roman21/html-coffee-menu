<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin — Barista School</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#f5f4f0;--surface:#fff;--border:#e8e5df;--border2:#f0ede8;
    --text:#1a1a1a;--muted:#888;--muted2:#bbb;
    --green:#417033;--green-bg:#eef5eb;--green-light:#e0edda;
    --red:#c0392b;--red-bg:#fdf0ee;
    --yellow:#b7820a;--yellow-bg:#fef9ec;
    --radius:12px;--shadow:0 2px 12px rgba(0,0,0,.07);
  }
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:14px;min-height:100vh}

  /* ── LOGIN ── */
  .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
  .login-card{background:var(--surface);border-radius:20px;box-shadow:0 4px 32px rgba(0,0,0,.1);padding:40px 36px;width:100%;max-width:400px}
  .login-logo{font-size:22px;font-weight:800;color:var(--green);margin-bottom:6px}
  .login-sub{font-size:13px;color:var(--muted);margin-bottom:28px}
  .field-label{font-size:12px;font-weight:600;color:#555;margin-bottom:5px;display:block}
  .field-input{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:10px 13px;font-size:14px;font-family:inherit;outline:none;background:#faf9f7;transition:border-color .15s,box-shadow .15s}
  .field-input:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(65,112,51,.1)}
  .login-field{margin-bottom:16px}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border:none;border-radius:10px;padding:10px 18px;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;transition:opacity .15s,transform .12s}
  .btn:hover{opacity:.85;transform:translateY(-1px)}
  .btn:active{transform:translateY(0)}
  .btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
  .btn-primary{background:var(--green);color:#fff;width:100%;padding:12px}
  .btn-sm{padding:5px 12px;font-size:12px;border-radius:8px}
  .btn-activate{background:var(--green-bg);color:var(--green)}
  .btn-deactivate{background:var(--red-bg);color:var(--red)}
  .btn-delete{background:#f4f3f0;color:#c0392b}
  .btn-icon{background:transparent;color:var(--muted);padding:4px 6px;border-radius:6px}
  .btn-icon:hover{background:var(--border2);color:var(--text);opacity:1}
  .login-error{color:var(--red);font-size:12px;margin-top:10px;display:none}

  /* ── LAYOUT ── */
  #app{display:none;flex-direction:column;min-height:100vh}
  .topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
  .topbar-left{display:flex;align-items:center;gap:12px}
  .topbar-logo{font-size:16px;font-weight:800;color:var(--green)}
  .topbar-title{font-size:14px;color:var(--muted);font-weight:500}
  .topbar-right{display:flex;align-items:center;gap:12px}
  .topbar-user{font-size:13px;color:var(--muted)}
  .btn-logout{background:#f4f3f0;color:#555;font-size:12px;padding:6px 12px;border-radius:8px}

  .main{flex:1;padding:24px;max-width:1100px;margin:0 auto;width:100%}

  /* ── STATS ── */
  .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:24px}
  .stat-card{background:var(--surface);border-radius:var(--radius);border:1.5px solid var(--border);padding:18px 20px;display:flex;flex-direction:column;gap:6px}
  .stat-value{font-size:28px;font-weight:800;line-height:1}
  .stat-label{font-size:12px;color:var(--muted);font-weight:500}
  .stat-card.green .stat-value{color:var(--green)}
  .stat-card.yellow .stat-value{color:var(--yellow)}
  .stat-card.red .stat-value{color:var(--red)}

  /* ── TOOLBAR ── */
  .toolbar{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap}
  .search-wrap{position:relative;flex:1;min-width:200px}
  .search-input{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:9px 13px 9px 36px;font-size:13px;font-family:inherit;outline:none;background:#faf9f7;transition:border-color .15s}
  .search-input:focus{border-color:var(--green);background:#fff}
  .search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--muted2);pointer-events:none}
  .filter-tabs{display:flex;gap:4px;background:var(--border2);border-radius:10px;padding:3px}
  .filter-tab{border:none;background:transparent;border-radius:8px;padding:6px 14px;font-size:12px;font-weight:600;font-family:inherit;cursor:pointer;color:var(--muted);transition:background .15s,color .15s}
  .filter-tab.active{background:var(--surface);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.08)}
  .btn-refresh{background:var(--border2);color:#555;font-size:12px;padding:7px 13px;border-radius:9px;white-space:nowrap}

  /* ── TABLE ── */
  .table-wrap{background:var(--surface);border-radius:var(--radius);border:1.5px solid var(--border);overflow:hidden;box-shadow:var(--shadow)}
  .table-empty{padding:48px 24px;text-align:center;color:var(--muted)}
  table{width:100%;border-collapse:collapse}
  th{padding:11px 16px;text-align:left;font-size:11px;font-weight:700;color:var(--muted2);text-transform:uppercase;letter-spacing:.05em;background:#faf9f7;border-bottom:1px solid var(--border)}
  td{padding:13px 16px;border-bottom:1px solid var(--border2);vertical-align:middle}
  tr:last-child td{border-bottom:none}
  tr:hover td{background:#fafaf8}
  .user-name{font-weight:600;color:var(--text)}
  .user-email{font-size:12px;color:var(--muted);margin-top:2px}
  .badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;border-radius:999px;padding:3px 9px;white-space:nowrap}
  .badge::before{content:'';display:inline-block;width:5px;height:5px;border-radius:50%}
  .badge-active{background:var(--green-light);color:#2d7a46}
  .badge-active::before{background:#2d7a46}
  .badge-pending{background:var(--yellow-bg);color:var(--yellow)}
  .badge-pending::before{background:var(--yellow)}
  .badge-admin{background:#ede9ff;color:#6c3fc5;margin-left:5px}
  .badge-admin::before{display:none}
  .actions{display:flex;gap:6px;justify-content:flex-end}
  .date-cell{font-size:12px;color:var(--muted);white-space:nowrap}

  /* ── TOAST ── */
  #toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(16px);background:#1a1a1a;color:#fff;font-size:13px;font-weight:600;border-radius:999px;padding:10px 22px;opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;z-index:9999;white-space:nowrap}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  #toast.error{background:#c0392b}
  #toast.success{background:#2d7a46}

  /* ── CONFIRM ── */
  .modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.35);backdrop-filter:blur(2px);z-index:500;display:none;align-items:center;justify-content:center;padding:20px}
  .modal-backdrop.open{display:flex}
  .modal{background:var(--surface);border-radius:18px;padding:28px 28px 24px;max-width:380px;width:100%;box-shadow:0 8px 40px rgba(0,0,0,.15)}
  .modal-title{font-size:16px;font-weight:800;margin-bottom:8px}
  .modal-body{font-size:14px;color:#555;margin-bottom:22px;line-height:1.5}
  .modal-actions{display:flex;gap:10px}
  .btn-danger{background:var(--red-bg);color:var(--red);flex:1}
  .btn-cancel{background:#f4f3f0;color:#555;flex:1}

  /* ── SPINNER ── */
  .spinner{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite}
  .spinner.dark{border-color:rgba(0,0,0,.15);border-top-color:#555}
  @keyframes spin{to{transform:rotate(360deg)}}

  @media(max-width:640px){
    .main{padding:16px}
    th:nth-child(3),td:nth-child(3){display:none}
    .topbar-title{display:none}
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="loginWrap">
  <div class="login-card">
    <div class="login-logo">☕ Barista School</div>
    <div class="login-sub">Панель администратора</div>
    <div class="login-field">
      <label class="field-label">Email</label>
      <input class="field-input" id="loginEmail" type="email" placeholder="admin@barista-school.online" autocomplete="username">
    </div>
    <div class="login-field">
      <label class="field-label">Пароль</label>
      <input class="field-input" id="loginPass" type="password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn btn-primary" id="loginBtn" onclick="doLogin()">Войти</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="topbar-left">
      <span class="topbar-logo">☕</span>
      <span class="topbar-title">Barista School Admin</span>
    </div>
    <div class="topbar-right">
      <span class="topbar-user" id="topbarUser"></span>
      <button class="btn btn-logout" onclick="doLogout()">Выйти</button>
    </div>
  </div>

  <div class="main">
    <!-- Stats -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-value" id="statTotal">—</div>
        <div class="stat-label">Всего пользователей</div>
      </div>
      <div class="stat-card green">
        <div class="stat-value" id="statActive">—</div>
        <div class="stat-label">Активных</div>
      </div>
      <div class="stat-card yellow">
        <div class="stat-value" id="statPending">—</div>
        <div class="stat-label">Ожидают активации</div>
      </div>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
      <div class="search-wrap">
        <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input class="search-input" id="searchInput" type="text" placeholder="Поиск по имени или email…" oninput="renderTable()">
      </div>
      <div class="filter-tabs">
        <button class="filter-tab active" onclick="setFilter('all',this)">Все</button>
        <button class="filter-tab" onclick="setFilter('active',this)">Активные</button>
        <button class="filter-tab" onclick="setFilter('pending',this)">Ожидают</button>
      </div>
      <button class="btn btn-refresh" onclick="loadUsers()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" style="display:inline;vertical-align:middle;margin-right:4px"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
        Обновить
      </button>
    </div>

    <!-- Table -->
    <div class="table-wrap">
      <div class="table-empty" id="tableEmpty" style="display:none">Нет пользователей</div>
      <div id="tableContainer">
        <table id="usersTable">
          <thead>
            <tr>
              <th>Пользователь</th>
              <th>Статус</th>
              <th>Зарегистрирован</th>
              <th style="text-align:right">Действия</th>
            </tr>
          </thead>
          <tbody id="usersBody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- Confirm modal -->
<div class="modal-backdrop" id="confirmModal">
  <div class="modal">
    <div class="modal-title" id="confirmTitle">Подтвердите действие</div>
    <div class="modal-body" id="confirmBody"></div>
    <div class="modal-actions">
      <button class="btn btn-cancel" onclick="closeConfirm()">Отмена</button>
      <button class="btn btn-danger" id="confirmOkBtn">Удалить</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const API = '';  // относительные пути — работает на любом домене
let _token = localStorage.getItem('admin_token') || '';
let _users = [];
let _filter = 'all';
let _confirmResolve = null;

// ── INIT ─────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', async () => {
  if (_token) {
    const ok = await checkAuth();
    if (ok) { showApp(); loadUsers(); return; }
  }
  showLogin();
});

function showLogin() {
  document.getElementById('loginWrap').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
}
function showApp() {
  document.getElementById('loginWrap').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
}

// ── AUTH ─────────────────────────────────────────────────────
async function checkAuth() {
  try {
    const r = await api('GET', '/api/auth/me');
    if (!r.is_admin) { toast('Нет прав администратора', 'error'); return false; }
    document.getElementById('topbarUser').textContent = r.email;
    return true;
  } catch { return false; }
}

async function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const pass  = document.getElementById('loginPass').value;
  const btn   = document.getElementById('loginBtn');
  const err   = document.getElementById('loginError');
  err.style.display = 'none';
  if (!email || !pass) { showErr('Введите email и пароль'); return; }
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>';
  try {
    const d = await api('POST', '/api/auth/login', { email, password: pass });
    if (!d.user?.is_admin) { showErr('Нет прав администратора'); return; }
    _token = d.token;
    localStorage.setItem('admin_token', _token);
    document.getElementById('topbarUser').textContent = d.user.email;
    showApp();
    loadUsers();
  } catch(e) {
    showErr(e.message || 'Неверный email или пароль');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Войти';
  }
}

function showErr(msg) {
  const err = document.getElementById('loginError');
  err.textContent = msg;
  err.style.display = 'block';
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('loginWrap').style.display !== 'none') doLogin();
});

function doLogout() {
  _token = '';
  localStorage.removeItem('admin_token');
  showLogin();
}

// ── USERS ─────────────────────────────────────────────────────
async function loadUsers() {
  try {
    _users = await api('GET', '/api/admin/users');
    renderStats();
    renderTable();
  } catch(e) {
    toast('Ошибка загрузки: ' + e.message, 'error');
  }
}

function renderStats() {
  const total   = _users.length;
  const active  = _users.filter(u => u.is_active).length;
  const pending = _users.filter(u => !u.is_active).length;
  document.getElementById('statTotal').textContent   = total;
  document.getElementById('statActive').textContent  = active;
  document.getElementById('statPending').textContent = pending;
}

function setFilter(f, el) {
  _filter = f;
  document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderTable();
}

function renderTable() {
  const q = (document.getElementById('searchInput').value || '').toLowerCase();
  let list = _users.filter(u => {
    if (_filter === 'active'  && !u.is_active) return false;
    if (_filter === 'pending' && u.is_active)  return false;
    if (q && !u.name.toLowerCase().includes(q) && !u.email.toLowerCase().includes(q)) return false;
    return true;
  });

  const empty = document.getElementById('tableEmpty');
  const cont  = document.getElementById('tableContainer');
  if (!list.length) { empty.style.display = 'block'; cont.style.display = 'none'; return; }
  empty.style.display = 'none';
  cont.style.display  = 'block';

  const tbody = document.getElementById('usersBody');
  tbody.innerHTML = list.map(u => `
    <tr id="row-${u.id}">
      <td>
        <div class="user-name">${esc(u.name)}${u.is_admin ? '<span class="badge badge-admin">admin</span>' : ''}</div>
        <div class="user-email">${esc(u.email)}</div>
      </td>
      <td>
        <span class="badge ${u.is_active ? 'badge-active' : 'badge-pending'}">
          ${u.is_active ? 'Активен' : 'Ожидает'}
        </span>
      </td>
      <td class="date-cell">${fmtDate(u.created_at)}</td>
      <td>
        <div class="actions">
          ${u.is_active
            ? `<button class="btn btn-sm btn-deactivate" onclick="toggleUser(${u.id},false)">Заблокировать</button>`
            : `<button class="btn btn-sm btn-activate" onclick="toggleUser(${u.id},true)">Активировать</button>`
          }
          ${!u.is_admin ? `<button class="btn btn-sm btn-delete" onclick="deleteUser(${u.id},'${esc(u.name)}')" title="Удалить">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
          </button>` : ''}
        </div>
      </td>
    </tr>
  `).join('');
}

// ── ACTIONS ──────────────────────────────────────────────────
async function toggleUser(id, activate) {
  const btn = document.querySelector(`#row-${id} .actions .btn`);
  if (btn) { btn.disabled = true; btn.innerHTML = '<span class="spinner dark"></span>'; }
  try {
    await api('PATCH', `/api/admin/users/${id}`, { is_active: activate });
    const u = _users.find(x => x.id === id);
    if (u) u.is_active = activate;
    renderStats();
    renderTable();
    toast(activate ? '✅ Пользователь активирован' : '🔒 Пользователь заблокирован', 'success');
  } catch(e) {
    toast('Ошибка: ' + e.message, 'error');
    if (btn) { btn.disabled = false; btn.textContent = activate ? 'Активировать' : 'Заблокировать'; }
  }
}

async function deleteUser(id, name) {
  const confirmed = await confirm2(`Удалить пользователя «${name}»?`, 'Это действие необратимо. Все данные пользователя будут удалены.');
  if (!confirmed) return;
  try {
    await api('DELETE', `/api/admin/users/${id}`);
    _users = _users.filter(u => u.id !== id);
    renderStats();
    renderTable();
    toast('🗑 Пользователь удалён', 'success');
  } catch(e) {
    toast('Ошибка: ' + e.message, 'error');
  }
}

// ── CONFIRM ──────────────────────────────────────────────────
function confirm2(title, body) {
  return new Promise(resolve => {
    _confirmResolve = resolve;
    document.getElementById('confirmTitle').textContent = title;
    document.getElementById('confirmBody').textContent  = body;
    document.getElementById('confirmOkBtn').onclick = () => { closeConfirm(); resolve(true); };
    document.getElementById('confirmModal').classList.add('open');
  });
}
function closeConfirm() {
  document.getElementById('confirmModal').classList.remove('open');
  if (_confirmResolve) { _confirmResolve(false); _confirmResolve = null; }
}

// ── UTILS ─────────────────────────────────────────────────────
async function api(method, path, body) {
  const opts = {
    method,
    headers: { 'Content-Type': 'application/json', ..._token ? { Authorization: `Bearer ${_token}` } : {} },
  };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(path, opts);
  const d = await r.json().catch(() => ({}));
  if (!r.ok) throw new Error(d.detail || r.statusText);
  return d;
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmtDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('ru-RU', { day:'2-digit', month:'2-digit', year:'numeric' })
    + ' ' + d.toLocaleTimeString('ru-RU', { hour:'2-digit', minute:'2-digit' });
}

let _toastTimer;
function toast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show' + (type === 'error' ? ' error' : type === 'success' ? ' success' : '');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.className = '', 3000);
}
</script>
</body>
</html>
